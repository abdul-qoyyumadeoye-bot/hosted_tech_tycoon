<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechTycoon - Results</title>
  <link rel="stylesheet" href="css/base.css?v=20260316b">
  <link rel="stylesheet" href="css/avatars.css?v=20260316b">
</head>
<body class="page-results">
  <nav class="topnav">
    <div class="topnav-content">
      <h1>TechTycoon Simulator</h1>
      <div class="progress-bar-container">
        <div class="progress-bar" style="width: 100%;"></div>
      </div>
      <button class="htp-btn" onclick="window.TechTycoonUI?.navigate('how-to-play.html')||(window.location.href='how-to-play.html')" aria-label="How to play guide">How to Play</button>
      <button class="access-btn" id="accessibility-toggle" aria-label="Accessibility settings" aria-expanded="false">&#9855;</button>
    </div>
  </nav>

  <div id="accessibility-panel" style="display: none;">
    <label>
      <input type="checkbox" id="big-text-toggle"> Large Text
    </label>
    <label>
      <input type="checkbox" id="tts-toggle"> Text-to-Speech
    </label>
    <button class="btn btn-primary" id="read-aloud-btn" style="display: none;">Read Aloud</button>
  </div>

  <main class="main-container">
    <div class="results-container">
      <h2 class="results-title">Game Complete!</h2>

      <div id="results-message" class="results-message results-block"></div>

      <div id="results-badges" class="results-badges results-block"></div>
      <div class="Final-scores-grid results-block">
        <div class="score-card">
          <div class="score-label">Impact</div>
          <div class="score-value" id="final-impact">0</div>
        </div>
        <div class="score-card">
          <div class="score-label">Inclusivity</div>
          <div class="score-value" id="final-inclusivity">0</div>
        </div>
        <div class="score-card">
          <div class="score-label">Trust</div>
          <div class="score-value" id="final-trust">0</div>
        </div>
        <div class="score-card">
          <div class="score-label">Budget Remaining</div>
          <div class="score-value budget" id="final-budget">£0</div>
          <div class="score-subtext" id="final-budget-base"></div>
        </div>
      </div>

      <div id="skills-fact" class="skills-fact results-block">
        <span class="skills-fact__label">Skills Tech Employers Look For</span>
        <ul class="skills-fact__list"></ul>
      </div>

      <div class="reflection-section results-block">
        <div class="reflection-title">Reflection Questions</div>
        <ul class="reflection-questions" id="reflection-questions"></ul>
      </div>

      <div id="summary-section" class="results-block" style="margin: 24px 0; padding: 16px; background: #f0f9ff; border-radius: 8px;">
        <h3 style="margin-top: 0;">Your Decisions</h3>
        <div id="decisions-summary"></div>
      </div>

      <div id="owner-skills" class="owner-skills results-block">
        <span class="owner-skills__label">Skills a Tech Startup Owner Must Have</span>
        <ul class="owner-skills__list"></ul>
      </div>

      <div class="button-group">
        <button class="btn btn-success" onclick="saveResults()">Save Results</button>
        <button class="btn btn-secondary" onclick="downloadResults()">Download as CSV</button>
        <button class="btn btn-primary" onclick="startNewGame()">Play Again</button>
      </div>
    </div>
  </main>

  <footer class="nav-footer">
  </footer>

  <script src="js/gameState.js?v=20260316b"></script>
  <script src="js/accessibility.js?v=20260316b"></script>
  <script src="js/ui.js?v=20260316b"></script>
  <script src="js/results.js?v=20260316b"></script>
</body>
</html>
