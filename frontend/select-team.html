<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechTycoon - Select Team</title>
  <link rel="stylesheet" href="css/base.css?v=20260316b">
  <link rel="stylesheet" href="css/avatars.css?v=20260316b">
</head>
<body class="page-team">
  <nav class="topnav">
    <div class="topnav-content">
      <h1>TechTycoon Simulator</h1>
      <div class="progress-bar-container">
        <div class="progress-bar" style="width: 35%;"></div>
      </div>
      <button class="htp-btn" onclick="window.TechTycoonUI?.navigate('how-to-play.html')||(window.location.href='how-to-play.html')" aria-label="How to play guide">How to Play</button>
      <button class="access-btn" id="accessibility-toggle" aria-label="Accessibility settings" aria-expanded="false">&#9855;</button>
    </div>
  </nav>

  <div id="accessibility-panel" style="display: none;">
    <label><input type="checkbox" id="big-text-toggle"> Large Text</label>
    <label><input type="checkbox" id="tts-toggle"> Text-to-Speech</label>
    <button class="btn btn-primary" id="read-aloud-btn" style="display: none;">Read Aloud</button>
  </div>

  <main class="main-container main-container--selection">
    <div class="stage-container selection-panel">
      <div class="panel-intro panel-intro--split">
        <div>
          <div class="panel-kicker">Team Builder</div>
          <h2>Assemble your startup team</h2>
          <p>Select 4 or 5 specialists. Your team should cover delivery, users, risk, and communication.</p>
        </div>
        <div class="team-counter-card" id="team-count">
          <span>Selected</span>
          <strong><span id="count">0</span>/5</strong>
          <small>Minimum 4 members</small>
        </div>
      </div>

      <button class="btn btn-secondary" type="button" id="team-hint-btn">Suggested Team</button>
      <div id="team-hint" class="team-hint-panel" style="display:none;"></div>

      <div class="avatar-grid avatar-grid--team" id="team-list"></div>
    </div>
  </main>

  <footer class="nav-footer">
    <div class="button-group">
      <button class="btn btn-secondary" onclick="goBack()">Back</button>
      <button class="btn btn-primary btn-large" id="continue-btn" disabled onclick="selectTeam()">Begin Run</button>
    </div>
  </footer>

  <div class="team-limit-bar" id="team-limit-bar" style="display:none" role="alert" aria-live="polite">
    <span class="team-limit-bar__icon">&#9888;</span>
    <span>Team is full &mdash; unselect a member to choose someone else.</span>
  </div>

  <!-- global badge tooltip, shown on hover via JS -->
  <div class="badge-hover-tooltip" id="badge-hover-tooltip" aria-hidden="true"></div>

  <script src="js/gameState.js?v=20260316b"></script>
  <script src="js/accessibility.js?v=20260316b"></script>
  <script src="js/ui.js?v=20260316b"></script>
  <script src="js/select-team.js?v=20260316b"></script>
</body>
</html>
